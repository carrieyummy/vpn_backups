mixed-port: 7890

# 允许局域网设备连接本机代理端口。关闭后其他机器无法使用本机 mixed-port。
allow-lan: true

# 只监听指定内网地址，避免代理端口暴露到其他网卡。
# 部署到实际运行目录后，把 <MIHOMO_LAN_IP> 替换为 Mihomo 主机的内网 IP。
bind-address: "<MIHOMO_LAN_IP>"

# 局域网来源 IP 白名单；只有下面这些机器可以访问本机 mixed-port，使用本机的代理。
# /32 表示精确到单台主机。按需替换或追加 <LAN_CLIENT_IP>。
lan-allowed-ips:
  - 127.0.0.1/32
  - "<MIHOMO_LAN_IP>/32"
  - "<LAN_CLIENT_IP>/32"

mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

# 访问管理面板时，在浏览器输入 mihomo 所在机器的 IP 地址和端口，如 http://<mihomo所在机器IP>:9090/ui/#/overview
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui-metacubexd

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853
  fallback-filter:
    geoip: true
    geoip-code: CN

tun:
  enable: false
  stack: mixed
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

proxy-providers:
  良心云:
    type: http
    url: "<LIANGXINYUN_SUBSCRIPTION_URL>"
    path: ./providers/liangxinyun.yaml
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: &proxy_test_interval 60

  魔戒:
    type: http
    url: "<MOJIE_SUBSCRIPTION_URL>"
    path: ./providers/mojie.yaml
    header:
      User-Agent:
        - "clash-verge-rev/v2.3.2"
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: *proxy_test_interval

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 全部节点
      - 自动选择
      - 故障转移
      - AI自动选择
      - 良心云兜底
      - 魔戒兜底
      - 良心云节点
      - 良心云自动选择
      - 良心云故障转移
      - 良心云新加坡自动
      - 良心云日本自动
      - 良心云美国自动
      - AI良心云
      - AI良心云自动
      - 良心云新加坡
      - 良心云日本
      - 良心云美国
      - 魔戒节点
      - 魔戒自动选择
      - 魔戒故障转移
      - 魔戒新加坡自动
      - 魔戒日本自动
      - 魔戒美国自动
      - AI魔戒
      - AI魔戒自动
      - 魔戒新加坡
      - 魔戒日本
      - 魔戒美国
      - DIRECT

  - name: 全部节点
    type: select
    proxies:
      - 良心云节点
      - 魔戒节点
      - DIRECT

  - name: 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    proxies:
      - 良心云自动选择
      - 魔戒自动选择

  - name: 故障转移
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    proxies:
      - 良心云故障转移
      - 魔戒故障转移

  - name: AI自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    proxies:
      - AI良心云自动
      - AI魔戒自动

  - name: 良心云兜底
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    proxies:
      - 良心云新加坡自动
      - 良心云日本自动
      - 良心云美国自动
      - AI自动选择

  - name: 魔戒兜底
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    proxies:
      - 魔戒新加坡自动
      - 魔戒日本自动
      - 魔戒美国自动
      - AI自动选择

  - name: 良心云节点
    type: select
    exclude-filter: "^(剩余流量|套餐到期)"
    use:
      - 良心云

  - name: 良心云自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    exclude-filter: "^(剩余流量|套餐到期)"
    use:
      - 良心云

  - name: 良心云故障转移
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    exclude-filter: "^(剩余流量|套餐到期)"
    use:
      - 良心云

  - name: 良心云新加坡自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    filter: "(?i)新加坡|狮城|🇸🇬|SG|Singapore"
    use:
      - 良心云

  - name: 良心云日本自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    filter: "(?i)日本|🇯🇵|JP|Japan"
    use:
      - 良心云

  - name: 良心云美国自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    filter: "(?i)美国|美國|🇺🇸|US|USA|United States|LA"
    use:
      - 良心云

  - name: AI良心云自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    exclude-filter: "香港|台湾|台灣|🇭🇰|🇹🇼|HK|HKT|TW|WAP|^(剩余流量|套餐到期)"
    use:
      - 良心云

  - name: AI良心云
    type: select
    proxies:
      - AI良心云自动
    exclude-filter: "香港|台湾|台灣|🇭🇰|🇹🇼|HK|HKT|TW|WAP|^(剩余流量|套餐到期)"
    use:
      - 良心云

  - name: 良心云新加坡
    type: select
    filter: "(?i)新加坡|狮城|🇸🇬|SG|Singapore"
    use:
      - 良心云

  - name: 良心云日本
    type: select
    filter: "(?i)日本|🇯🇵|JP|Japan"
    use:
      - 良心云

  - name: 良心云美国
    type: select
    filter: "(?i)美国|美國|🇺🇸|US|USA|United States|LA"
    use:
      - 良心云

  - name: 魔戒节点
    type: select
    exclude-filter: "^(剩余流量|套餐到期)"
    use:
      - 魔戒

  - name: 魔戒自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    exclude-filter: "^(剩余流量|套餐到期)"
    use:
      - 魔戒

  - name: 魔戒故障转移
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    exclude-filter: "^(剩余流量|套餐到期)"
    use:
      - 魔戒

  - name: 魔戒新加坡自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    filter: "(?i)新加坡|狮城|🇸🇬|SG|Singapore"
    use:
      - 魔戒

  - name: 魔戒日本自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    filter: "(?i)日本|🇯🇵|JP|Japan"
    use:
      - 魔戒

  - name: 魔戒美国自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    filter: "(?i)美国|美國|🇺🇸|US|USA|United States|LA"
    use:
      - 魔戒

  - name: AI魔戒自动
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: *proxy_test_interval
    tolerance: 50
    exclude-filter: "香港|台湾|台灣|🇭🇰|🇹🇼|HK|HKT|TW|WAP|^(剩余流量|套餐到期)"
    use:
      - 魔戒

  - name: AI魔戒
    type: select
    proxies:
      - AI魔戒自动
    exclude-filter: "香港|台湾|台灣|🇭🇰|🇹🇼|HK|HKT|TW|WAP|^(剩余流量|套餐到期)"
    use:
      - 魔戒

  - name: 魔戒新加坡
    type: select
    filter: "(?i)新加坡|狮城|🇸🇬|SG|Singapore"
    use:
      - 魔戒

  - name: 魔戒日本
    type: select
    filter: "(?i)日本|🇯🇵|JP|Japan"
    use:
      - 魔戒

  - name: 魔戒美国
    type: select
    filter: "(?i)美国|美國|🇺🇸|US|USA|United States|LA"
    use:
      - 魔戒

rules:
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve # 私网地址直连
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve # 私网地址直连
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve # 私网地址直连
  - GEOSITE,category-ads-all,REJECT
  - DOMAIN-SUFFIX,openai.com,节点选择
  - DOMAIN-SUFFIX,chatgpt.com,节点选择
  - DOMAIN-SUFFIX,oaistatic.com,节点选择
  - DOMAIN-SUFFIX,oaiusercontent.com,节点选择
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,节点选择
